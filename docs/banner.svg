<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">ActiveTAG Configurator</title>
  <desc id="desc">Native Windows configuration utility for OptiTrack Active Tags</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071015"/>
      <stop offset="0.55" stop-color="#10242a"/>
      <stop offset="1" stop-color="#123d36"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#55e6bd" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#55e6bd" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <rect width="1400" height="420" rx="28" fill="url(#background)"/>
  <circle cx="1190" cy="80" r="230" fill="url(#glow)"/>
  <circle cx="1220" cy="350" r="170" fill="url(#glow)" opacity="0.6"/>

  <g opacity="0.16" stroke="#78f0cf" fill="none">
    <path d="M0 334 C250 250 390 410 640 320 S1050 230 1400 320" stroke-width="2"/>
    <path d="M0 360 C250 276 390 436 640 346 S1050 256 1400 346" stroke-width="1"/>
    <path d="M0 386 C250 302 390 462 640 372 S1050 282 1400 372" stroke-width="1"/>
  </g>

  <g transform="translate(1005 45)">
    <rect x="-8" y="-8" width="330" height="330" rx="30" fill="#55e6bd" opacity="0.16" filter="url(#softGlow)"/>
    <rect width="314" height="314" rx="26" fill="#f8fbfa" stroke="#55e6bd" stroke-width="3"/>
    <image href="active-tag-product.png" x="7" y="7" width="300" height="300" preserveAspectRatio="xMidYMid meet"/>
    <rect x="70" y="289" width="174" height="39" rx="19.5" fill="#0d2523" stroke="#55e6bd" stroke-width="2"/>
    <text x="157" y="314" text-anchor="middle" fill="#8ff8dc" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="1">ACTIVE TAG</text>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="76" y="100" fill="#55e6bd" font-size="21" font-weight="700" letter-spacing="4">NATIVE WINDOWS TOOL</text>
    <text x="72" y="185" fill="#f3fbf8" font-size="68" font-weight="700">ActiveTAG</text>
    <text x="72" y="250" fill="#b9cbc6" font-size="38" font-weight="400">Configurator</text>
    <text x="76" y="310" fill="#9fb3ae" font-size="22">Read. Export. Override. Verify. Save.</text>
    <g transform="translate(76 344)">
      <rect width="128" height="38" rx="19" fill="#15372f" stroke="#3b8d78"/>
      <text x="64" y="25" text-anchor="middle" fill="#8ff8dc" font-size="15" font-weight="600">C++ / Win32</text>
      <rect x="142" width="148" height="38" rx="19" fill="#15372f" stroke="#3b8d78"/>
      <text x="216" y="25" text-anchor="middle" fill="#8ff8dc" font-size="15" font-weight="600">Single EXE</text>
      <rect x="304" width="180" height="38" rx="19" fill="#15372f" stroke="#3b8d78"/>
      <text x="394" y="25" text-anchor="middle" fill="#8ff8dc" font-size="15" font-weight="600">No Web Server</text>
    </g>
  </g>
</svg>
